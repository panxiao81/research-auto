<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}research-auto{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body class="bg-body-tertiary">
    <header class="navbar navbar-expand-lg bg-white border-bottom sticky-top shadow-sm">
      <div class="container-xl">
        <a class="navbar-brand fw-semibold" href="/ui">research-auto</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/ui/papers">Papers</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/search">Search</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/stats">Stats</a></li>
            <li class="nav-item"><a class="nav-link" href="/ui/jobs">Jobs</a></li>
          </ul>
          <form class="d-flex" method="get" action="/ui/search">
            <input class="form-control form-control-sm" type="search" name="q" placeholder="Search title, summary, question">
          </form>
        </div>
      </div>
    </header>
    <main class="container-xl py-4">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
  </html>
